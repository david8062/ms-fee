spring.application.name=ms-fees

# ================================
#     Base de datos PostgreSQL
# ================================
spring.datasource.url=jdbc:postgresql://postgres:5432/iuscloud_fees
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
server.port=8085
server.servlet.context-path=/ms-fees/

# ================================
#      SPRING SECURITY
# ================================
security.jwt.secret=zxfQiQ/OOKEMgvaetUUVY6aejYur6X5OSonLrKEwBWempbBEFoN/aruX5o4JY7eQy6TTY/9PLlRKdBlx2RgWoA==
security.jwt.expiration=86400000

# ================================
#      Configuracion Flyway
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ================================
#      Redis
# ================================
spring.data.redis.host=redis
spring.data.redis.port=6379

# ================================
#      Actuator
# ================================
management.endpoints.web.exposure.include=health
